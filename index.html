<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>문장 배열 학습지 생성기</title>
<style>
  :root{
    --fs: 12pt;     /* 본문 글자 크기 */
    --lh: 1.7;      /* 줄 간격(배수) */
    --gap: 18mm;    /* 답안 작성 공간 */
    --mt: 18mm; --mr: 18mm; --mb: 18mm; --ml: 18mm;  /* 여백 */
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Nanum Gothic","Noto Sans KR",sans-serif;
    color:#1a1a1a; background:#eef0f3;
  }
  .app{ display:flex; min-height:100vh; }

  /* ---- 좌측 컨트롤 패널 ---- */
  .controls{ width:370px; flex:0 0 370px; background:#fff; border-right:1px solid #e5e7eb;
    padding:18px 18px 28px; height:100vh; overflow:auto; position:sticky; top:0; }
  .controls h2{ margin:0 0 2px; font-size:18px; }
  .controls .desc{ color:#6b7280; font-size:12px; margin-bottom:14px; }
  .field{ margin-bottom:14px; }
  .field > label{ display:block; font-size:13px; font-weight:700; margin-bottom:5px; }
  .field textarea{ width:100%; height:120px; resize:vertical; font-size:13px; padding:8px;
    border:1px solid #d1d5db; border-radius:6px; font-family:inherit; line-height:1.5; }
  .field input[type=text]{ width:100%; padding:7px 8px; border:1px solid #d1d5db; border-radius:6px; font-size:13px; }
  .filebar{ display:flex; gap:6px; margin-top:6px; }
  .filebar label{ font-size:11.5px; color:#2563eb; cursor:pointer; border:1px dashed #93c5fd;
    border-radius:6px; padding:4px 8px; }
  .filebar input{ display:none; }

  .sliders{ border-top:1px solid #eee; padding-top:12px; }
  .row{ display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .row > label{ flex:0 0 128px; font-size:13px; }
  .row input[type=range]{ flex:1; }
  .row .val{ flex:0 0 56px; text-align:right; font-variant-numeric:tabular-nums; font-size:12px; color:#374151; }

  .check{ display:flex; align-items:center; gap:8px; font-size:13px; margin:8px 0 2px; }
  .btns{ display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
  button{ font:inherit; padding:9px 12px; border-radius:8px; border:1px solid #d1d5db; background:#fff; cursor:pointer; }
  button:hover{ background:#f9fafb; }
  button.primary{ background:#2563eb; color:#fff; border-color:#2563eb; }
  button.primary:hover{ background:#1d4ed8; }
  .warn{ color:#b45309; font-size:12px; margin-top:10px; min-height:16px; }
  .note{ font-size:11.5px; color:#6b7280; margin-top:12px; line-height:1.55; border-top:1px solid #eee; padding-top:10px; }

  /* ---- 우측 미리보기 ---- */
  .preview{ flex:1; padding:24px; height:100vh; overflow:auto; }
  .sheet{ background:#fff; width:210mm; min-height:297mm; margin:0 auto 22px;
    padding:var(--mt) var(--mr) var(--mb) var(--ml); box-shadow:0 1px 8px rgba(0,0,0,.15); }
  .sheet h1{ font-size:16pt; margin:0 0 6px; }
  .sheet .subtitle{ color:#555; font-size:10.5pt; margin-bottom:8px; }
  .sheet hr{ border:none; border-top:1px solid #bbb; margin:0 0 14px; }
  .items{ font-size:var(--fs); line-height:var(--lh); }
  .item{ margin-bottom:4px; }
  .item .ko{ font-weight:700; }
  .item .scram{ padding-left:16px; }
  .item .answer-space{ height:var(--gap); }
  .ans .item{ margin-bottom:8px; }
  .ans .eng{ font-weight:700; }
  .ans .ko-sub{ color:#666; font-size:calc(var(--fs) - 1pt); padding-left:16px; }
  .empty{ color:#9ca3af; font-size:13pt; }

  @media print{
    body{ background:#fff; }
    .controls{ display:none !important; }
    .preview{ padding:0; height:auto; overflow:visible; }
    .sheet{ width:auto; min-height:0; margin:0; padding:0; box-shadow:none; }
    .sheet.answers{ page-break-before:always; }
    .item{ break-inside:avoid; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- 컨트롤 -->
  <aside class="controls">
    <h2>문장 배열 학습지 생성기</h2>
    <div class="desc">영어 지문을 단어 배열 문제로 만들고 한국어 해석과 짝지어 PDF로 인쇄합니다.</div>

    <div class="field">
      <label>제목</label>
      <input type="text" id="title" placeholder="예: 문장 배열 학습지 — Set 1">
    </div>

    <div class="field">
      <label>영어 지문</label>
      <textarea id="eng" placeholder="영어 지문을 붙여넣으세요. 문장 단위로 자동 분리됩니다."></textarea>
      <div class="filebar"><label>📄 txt 불러오기<input type="file" id="engFile" accept=".txt,text/plain"></label></div>
    </div>

    <div class="field">
      <label>한국어 해석 <span style="font-weight:400;color:#6b7280">(한 줄에 한 문장)</span></label>
      <textarea id="kor" placeholder="한 줄에 한 문장씩 한국어 해석을 입력하세요."></textarea>
      <div class="filebar"><label>📄 txt 불러오기<input type="file" id="korFile" accept=".txt,text/plain"></label></div>
    </div>

    <div class="sliders">
      <div class="row"><label>줄 간격 (배수)</label><input type="range" id="lh" min="1" max="2.6" step="0.05"><span class="val" id="lhVal"></span></div>
      <div class="row"><label>글자 크기 (pt)</label><input type="range" id="fs" min="9" max="16" step="0.5"><span class="val" id="fsVal"></span></div>
      <div class="row"><label>답안 공간 (mm)</label><input type="range" id="gap" min="0" max="40" step="1"><span class="val" id="gapVal"></span></div>
      <div class="row"><label>여백 — 위 (mm)</label><input type="range" id="mt" min="5" max="35" step="1"><span class="val" id="mtVal"></span></div>
      <div class="row"><label>여백 — 아래 (mm)</label><input type="range" id="mb" min="5" max="35" step="1"><span class="val" id="mbVal"></span></div>
      <div class="row"><label>여백 — 좌 (mm)</label><input type="range" id="ml" min="5" max="35" step="1"><span class="val" id="mlVal"></span></div>
      <div class="row"><label>여백 — 우 (mm)</label><input type="range" id="mr" min="5" max="35" step="1"><span class="val" id="mrVal"></span></div>
    </div>

    <label class="check"><input type="checkbox" id="withAnswers" checked> 정답지 포함</label>

    <div class="btns">
      <button class="primary" id="printBtn">🖨 인쇄 / PDF로 저장</button>
      <button id="sampleBtn">예시 채우기</button>
      <button id="resetBtn">기본값 복원</button>
    </div>
    <div class="warn" id="warn"></div>
    <div class="note">
      • 문장 분리는 브라우저 내장 분석기(Intl.Segmenter)로 처리합니다.<br>
      • 설정과 입력 내용은 이 브라우저에 자동 저장되어 다음에 열 때 그대로 복원됩니다.<br>
      • 인쇄창에서 대상은 <b>“PDF로 저장”</b>, <b>머리글/바닥글 해제</b>, 여백은 <b>“기본”</b>으로 두면 깔끔합니다.<br>
      • 한국어는 <b>한 줄에 한 문장</b>이어야 영어 문장과 정확히 짝지어집니다.
    </div>
  </aside>

  <!-- 미리보기 -->
  <main class="preview" id="preview">
    <section class="sheet problem" id="problemSheet"></section>
    <section class="sheet answers" id="answerSheet"></section>
  </main>
</div>

<!-- 인쇄 페이지 여백(@page)은 JS가 실제 mm 값으로 채움 -->
<style id="pageStyle"></style>

<script>
"use strict";

const DEFAULTS = {
  title: "문장 배열 학습지 — Set 1",
  eng: "", kor: "",
  lh: 1.7, fs: 12, gap: 18,
  mt: 18, mb: 18, ml: 18, mr: 18,
  withAnswers: true
};

const SAMPLE_EN =
  "No one wants to fail. We all want to succeed in everything we try and to avoid failure. " +
  "Nonetheless, failing and learning from our bitter experiences is necessary for success. " +
  "In fact, the most successful people are often people who have experienced many more failures than others. " +
  "One of the most famous examples of someone who learned from failure was Thomas Edison. " +
  "He was one of the world's greatest inventors, and he acquired over 1,000 patents. " +
  "Like a wizard, he seemed to take ideas from thin air. " +
  "However, he also faced tremendous difficulties. " +
  "Edison is said to have failed 9,999 times before creating a perfect light bulb. " +
  "Unlike the average person, Edison saw these mistakes not as failures but as an inevitable part of the invention process.";

const SAMPLE_KO = [
  "아무도 실패하기를 원하지 않는다.",
  "우리 모두는 우리가 시도하는 모든 일들에서 성공하기를 원하고 실패를 피하기를 원한다.",
  "그럼에도 불구하고, 실패하는 것과 우리의 고통스러운 경험들로부터 배우는 것은 성공을 위해서 필요하다.",
  "실제로, 가장 성공한 사람들은 종종 다른 사람들보다 훨씬 더 많은 실패를 경험한 사람들이다.",
  "실패로부터 배웠던 사람에 대한 가장 유명한 예들 중의 하나는 Thomas Edison이었다.",
  "그는 세계의 가장 위대한 발명가들 중의 한 명이었고, 1,000개가 넘는 특허를 취득했다.",
  "마법사처럼, 그는 갑자기 어딘가에서 아이디어를 얻는 것처럼 보였다.",
  "하지만 그 또한 엄청나게 큰 어려움들에 직면했다.",
  "Edison은 완벽한 전구 하나를 만들기까지 9,999번 실패를 했다고 한다.",
  "평범한 사람과 달리, Edison은 이러한 실수들을 실패가 아니라 발명 과정의 필연적인 부분으로 여겼다."
].join("\n");

const STORE_KEY = "worksheet-generator-v1";
const $ = id => document.getElementById(id);
const SLIDERS = ["lh","fs","gap","mt","mb","ml","mr"];

/* ---------------- 텍스트 처리 ---------------- */

// ---- 문장 분리: 브라우저 내장 NLP(Intl.Segmenter) 사용, 미지원 시 정규식 폴백 ----
const HAS_SEG = (typeof Intl !== "undefined" && typeof Intl.Segmenter === "function");
const EN_SEG = HAS_SEG ? new Intl.Segmenter("en", { granularity:"sentence" }) : null;
const KO_SEG = HAS_SEG ? new Intl.Segmenter("ko", { granularity:"sentence" }) : null;

// 마침표로 끝나지만 문장 끝이 아닌 약어 → 다음 조각과 병합
const ABBR = /\b(?:Mr|Mrs|Ms|Dr|Prof|Sr|Jr|St|vs|etc|e\.g|i\.e)\.$/i;

// 약어로 끝나거나 따옴표 짝이 안 맞는 조각은 다음 문장과 합친다.
function refineSentences(list){
  const out = []; let pending = "";
  for(let s of list){
    s = s.trim(); if(!s) continue;
    if(pending){ s = pending + " " + s; pending = ""; }
    const dq = (s.match(/"/g) || []).length;
    if(ABBR.test(s) || dq % 2 === 1){ pending = s; continue; }
    out.push(s);
  }
  if(pending) out.push(pending);
  return out;
}

// 영어: 줄바꿈을 공백으로 정규화한 뒤 문장 단위로 분리
function splitEnglish(text){
  text = (text||"").replace(/\s+/g," ").trim();
  if(!text) return [];
  const raw = EN_SEG
    ? [...EN_SEG.segment(text)].map(x => x.segment)
    : text.split(/(?<=[.!?]["']?)\s+(?=[A-Z"'(])/);
  return refineSentences(raw);
}

// 한국어: 줄 단위(한 줄 한 문장)를 유지하되, 한 줄에 여러 문장이면 추가 분리
function splitKorean(text){
  const lines = (text||"").split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const out = [];
  for(const line of lines){
    const segs = KO_SEG
      ? [...KO_SEG.segment(line)].map(x => x.segment)
      : line.split(/(?<=[.!?。])\s+(?=\S)/);
    for(let s of segs){ s = s.trim(); if(s) out.push(s); }
  }
  return out;
}

// 단어 토큰화: 한 글자 단어와 관사 the 는 뒤 단어와 한 덩어리로 묶음
function chunkTokens(sentence){
  const tokens = sentence.split(/\s+/).filter(Boolean);
  const out = []; let prefix = "";
  for(const w of tokens){
    if(w.length === 1 || w.toLowerCase() === "the"){ prefix += w + " "; }
    else if(prefix){ out.push(prefix + w); prefix = ""; }
    else { out.push(w); }
  }
  if(prefix.trim()) out.push(prefix.trim());
  return out;
}

function shuffle(a){
  for(let i=a.length-1; i>0; i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function scramble(sentence){
  const chunks = shuffle(chunkTokens(sentence));
  return "( " + chunks.join(" / ") + " )";
}

function esc(s){
  return (s||"").replace(/[&<>]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[c]));
}

/* ---------------- 상태 ---------------- */

function readState(){
  const s = {
    title: $("title").value,
    eng: $("eng").value,
    kor: $("kor").value,
    withAnswers: $("withAnswers").checked
  };
  s.lh = parseFloat($("lh").value);
  s.fs = parseFloat($("fs").value);
  s.gap = parseFloat($("gap").value);
  s.mt = parseFloat($("mt").value);
  s.mb = parseFloat($("mb").value);
  s.ml = parseFloat($("ml").value);
  s.mr = parseFloat($("mr").value);
  return s;
}

function applyState(s){
  $("title").value = s.title;
  $("eng").value = s.eng;
  $("kor").value = s.kor;
  $("withAnswers").checked = !!s.withAnswers;
  SLIDERS.forEach(k => { $(k).value = s[k]; });
}

function save(s){
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e){ /* 저장 불가 환경 무시 */ }
}

function load(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return Object.assign({}, DEFAULTS, JSON.parse(raw));
  } catch(e){ /* 손상 시 기본값 */ }
  return Object.assign({}, DEFAULTS);
}

/* ---------------- 렌더 ---------------- */

function applyVars(s){
  const r = document.documentElement.style;
  r.setProperty("--fs", s.fs + "pt");
  r.setProperty("--lh", String(s.lh));
  r.setProperty("--gap", s.gap + "mm");
  r.setProperty("--mt", s.mt + "mm");
  r.setProperty("--mb", s.mb + "mm");
  r.setProperty("--ml", s.ml + "mm");
  r.setProperty("--mr", s.mr + "mm");
  $("pageStyle").textContent =
    "@page{ size:A4; margin:" + s.mt + "mm " + s.mr + "mm " + s.mb + "mm " + s.ml + "mm; }";
  SLIDERS.forEach(k => {
    const unit = (k === "lh") ? "×" : (k === "fs" ? "pt" : "mm");
    $(k + "Val").textContent = s[k] + unit;
  });
}

function render(){
  const s = readState();
  applyVars(s);
  save(s);

  const en = splitEnglish(s.eng);
  const ko = splitKorean(s.kor);
  const n = Math.min(en.length, ko.length);

  // 경고(문장 수 불일치 등)
  let warn = "";
  if(en.length === 0 && ko.length === 0){ warn = ""; }
  else if(en.length !== ko.length){
    warn = "영어 " + en.length + "문장 / 한국어 " + ko.length + "문장 — 앞쪽 " + n +
           "개만 짝지었습니다. 한국어는 한 줄에 한 문장씩 입력하세요.";
  }
  $("warn").textContent = warn;

  // 문제지
  const title = esc(s.title || "문장 배열 학습지");
  let html = "<h1>" + title + "</h1>";
  if(n > 0){
    html += '<div class="subtitle">이름: ______________&nbsp;&nbsp;&nbsp; 점수: ______ / ' + n +
            '&nbsp;&nbsp;&nbsp; 날짜: ______________</div>';
  }
  html += "<hr>";
  if(n === 0){
    html += '<div class="empty">왼쪽에 영어 지문과 한국어 해석을 입력하면 여기에 학습지가 만들어집니다. ' +
            '“예시 채우기”로 미리 볼 수 있어요.</div>';
  } else {
    html += '<div class="items">';
    for(let k=0; k<n; k++){
      html += '<div class="item"><div class="ko">' + (k+1) + ". " + esc(ko[k]) + "</div>" +
              '<div class="scram">' + esc(scramble(en[k])) + "</div>" +
              '<div class="answer-space"></div></div>';
    }
    html += "</div>";
  }
  $("problemSheet").innerHTML = html;

  // 정답지
  const ansEl = $("answerSheet");
  if(s.withAnswers && n > 0){
    ansEl.style.display = "";
    let a = "<h1>" + title + " — 정답지</h1><hr><div class='items ans'>";
    for(let k=0; k<n; k++){
      a += '<div class="item"><div class="eng">' + (k+1) + ". " + esc(en[k]) + "</div>" +
           '<div class="ko-sub">' + esc(ko[k]) + "</div></div>";
    }
    a += "</div>";
    ansEl.innerHTML = a;
  } else {
    ansEl.style.display = "none";
    ansEl.innerHTML = "";
  }
}

/* ---------------- 이벤트 ---------------- */

function bind(){
  ["title","eng","kor"].forEach(id => $(id).addEventListener("input", render));
  $("withAnswers").addEventListener("change", render);
  SLIDERS.forEach(k => $(k).addEventListener("input", render));

  $("printBtn").addEventListener("click", () => window.print());

  $("sampleBtn").addEventListener("click", () => {
    $("title").value = "문장 배열 학습지 — Set 1";
    $("eng").value = SAMPLE_EN;
    $("kor").value = SAMPLE_KO;
    render();
  });

  $("resetBtn").addEventListener("click", () => {
    SLIDERS.forEach(k => { $(k).value = DEFAULTS[k]; });
    $("withAnswers").checked = DEFAULTS.withAnswers;
    render();
  });

  // txt 파일 불러오기
  $("engFile").addEventListener("change", e => loadFileInto(e.target, "eng"));
  $("korFile").addEventListener("change", e => loadFileInto(e.target, "kor"));
}

function loadFileInto(input, targetId){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => { $(targetId).value = reader.result; render(); };
  reader.readAsText(file, "UTF-8");
  input.value = "";   // 같은 파일 다시 선택 가능하도록 초기화
}

/* ---------------- 시작 ---------------- */
applyState(load());
bind();
render();
</script>
</body>
</html>
